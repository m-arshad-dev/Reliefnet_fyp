name: CI

on:
  push:
  pull_request:

jobs:
  api:
    name: API — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  web:
    name: Web — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  migrations:
    name: Migrations — smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reliefnet
          POSTGRES_PASSWORD: reliefnet
          POSTGRES_DB: reliefnet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reliefnet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://reliefnet:reliefnet@localhost:5432/reliefnet_test
      SEED_ADMIN_EMAIL: admin@reliefnet.org
      SEED_ADMIN_PASSWORD: ChangeMe123!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      # Applying cleanly against a fresh Postgres is the smoke test.
      - run: npx node-pg-migrate up
